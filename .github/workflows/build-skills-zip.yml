name: Build skills.zip

on:
  push:
    branches: [main]
    paths:
      - "plugins/core/skills/actioner-mcp-server/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create skills.zip
        run: |
          cd plugins/core/skills/actioner-mcp-server
          zip -r ../../../../skills.zip .

      - name: Commit and push skills.zip
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills.zip
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update skills.zip"
          git push
